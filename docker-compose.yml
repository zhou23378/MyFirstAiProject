version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: salon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-salon123}
      MYSQL_DATABASE: salon
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-salon123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: salon-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/salon?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-salon123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: salon-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  ai-python:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: salon-ai
    restart: unless-stopped
    environment:
      AI_HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-salon123}
      DB_NAME: salon
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80,http://localhost:3000}
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  chroma_data:
