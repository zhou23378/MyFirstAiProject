name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Test backend
        run: cd backend && mvn test -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.backend -t salon-backend .
          docker build -f Dockerfile.frontend -t salon-frontend .
          docker build -f Dockerfile.ai -t salon-ai .

      - name: Smoke test
        run: |
          cp .env.example .env
          docker compose up -d
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ | grep -q 200; then
              echo "Frontend is up!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          curl -s http://localhost:8080/actuator/health | grep -q UP
          echo "All services healthy!"
          docker compose down
