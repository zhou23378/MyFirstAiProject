name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Test backend
        run: cd backend && mvn test -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build core Docker images
        run: |
          docker compose build backend frontend

      - name: Smoke test core stack
        run: |
          set -euo pipefail
          cp .env.example .env
          docker compose up -d mysql backend frontend
          docker compose ps

          echo "Waiting for services to be healthy..."

          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/actuator/health | grep -q UP; then
              echo "Backend is up!"
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "Backend did not become healthy in time."
              docker compose ps
              exit 1
            fi
            echo "Waiting for backend... ($i/40)"
            sleep 5
          done

          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null http://localhost:80/; then
              echo "Frontend is up!"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Frontend did not become healthy in time."
              docker compose ps
              exit 1
            fi
            echo "Waiting for frontend... ($i/20)"
            sleep 5
          done

          echo "Core services healthy!"

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs --no-color mysql backend frontend || true

      - name: Cleanup Docker services
        if: always()
        run: docker compose down -v --remove-orphans || true
