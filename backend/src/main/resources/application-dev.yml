# 美发沙龙会员管理系统 - 开发环境配置
# 仅用于本地开发，可提交到版本控制

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/salon?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

# JWT 配置（开发环境默认值，生产通过环境变量覆盖）
jwt:
  secret: ${JWT_SECRET:dev-secret-do-not-use-in-production}
  expiration: 86400000

# Swagger 开发环境启用
springdoc:
  swagger-ui:
    enabled: true
